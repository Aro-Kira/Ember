[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["backend/src/**", "backend/node_modules/**"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/uploads/*"
  to = "/.netlify/functions/api/uploads/:splat"
  status = 200

[[redirects]]
  from = "/leader/*"
  to = "/leader/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
