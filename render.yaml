services:
  - type: web
    name: ember-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGINS
        value: '*'
      - key: DATABASE_URL
        fromDatabase:
          name: ember-db
          property: connectionString
    preDeployCommand: node src/config/migrate.js
    healthCheckPath: /api/health

databases:
  - name: ember-db
    plan: free
    databaseName: risktaker_youth
